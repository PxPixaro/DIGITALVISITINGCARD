<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIXARO Visiting Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#dac765;
    --gold2:#fff4a3;
    --dark:#050505;
    --red:#b5161f;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 14px;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,215,95,.20), transparent 26%),
      radial-gradient(circle at 80% 85%, rgba(255,215,95,.14), transparent 28%),
      linear-gradient(135deg,#000,#090909 45%,#18090a);
    color:#fff;
    font-family:Montserrat, Arial, sans-serif;
    overflow-x:hidden;
  }
  body:before {
    content:"";
    position:fixed; inset:-40%;
    background:conic-gradient(from 0deg, transparent, rgba(255,215,80,.16), transparent 14%, transparent 60%, rgba(255,215,80,.11), transparent);
    animation:bgSpin 16s linear infinite;
    pointer-events:none;
  }
  @keyframes bgSpin { to { transform:rotate(360deg); } }
  .wrap { width:min(980px,100%); position:relative; z-index:1; }
  .title { text-align:center; margin-bottom:22px; letter-spacing:3px; color:var(--gold2); text-shadow:0 0 22px rgba(255,220,90,.65); }
  .title strong { font-size:clamp(28px,5vw,56px); font-weight:900; }
  .title span { display:block; color:#f3e68d; font-size:14px; letter-spacing:7px; margin-top:3px; }
  .cards { display:grid; gap:26px; }
  .card {
    position:relative;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 0 35px rgba(218,199,101,.25), 0 18px 60px rgba(0,0,0,.7);
    border:1px solid rgba(255,230,120,.35);
    background:#111;
    isolation:isolate;
  }
  .card img { width:100%; display:block; user-select:none; }
  .shine:before {
    content:"";
    position:absolute; inset:-70% -35%;
    background:linear-gradient(110deg, transparent 38%, rgba(255,255,255,.08) 43%, rgba(255,246,157,.85) 49%, rgba(255,255,255,.16) 54%, transparent 61%);
    transform:translateX(-85%) rotate(8deg);
    animation:shineMove 3.1s ease-in-out infinite;
    mix-blend-mode:screen;
    z-index:2;
    pointer-events:none;
  }
  @keyframes shineMove { 0%{transform:translateX(-85%) rotate(8deg)} 55%,100%{transform:translateX(85%) rotate(8deg)} }
  .gold-line {
    position:absolute;
    left:5%; right:5%; height:3px;
    background:linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
    box-shadow:0 0 16px var(--gold);
    opacity:.92; z-index:3;
    animation:linePulse 2.2s ease-in-out infinite alternate;
  }
  .front .gold-line { bottom:25.5%; }
  .back .gold-line { top:30.5%; left:50%; right:5%; }
  @keyframes linePulse { from{filter:brightness(.9); box-shadow:0 0 7px var(--gold)} to{filter:brightness(1.65); box-shadow:0 0 24px var(--gold2)} }
  .scan-light {
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent 0%, rgba(255,215,80,.0) 35%, rgba(255,215,80,.27) 50%, rgba(255,215,80,.0) 65%, transparent 100%);
    transform:translateX(-100%);
    animation:scan 4s linear infinite;
    z-index:4; pointer-events:none;
  }
  @keyframes scan { 0%{transform:translateX(-100%)} 70%,100%{transform:translateX(100%)} }
  .action-panel {
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:22px;
  }
  .btn {
    color:#111; text-decoration:none; font-weight:800;
    background:linear-gradient(135deg,#c49b32,#fff2a5,#d2b34f);
    padding:13px 18px; border-radius:999px;
    box-shadow:0 0 22px rgba(255,218,88,.35);
    transition:.25s;
  }
  .btn:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 0 35px rgba(255,232,120,.72); }
  .hotspot { position:absolute; z-index:9; border-radius:14px; }
  .hotspot:hover { outline:2px solid rgba(255,222,90,.85); box-shadow:0 0 18px rgba(255,222,90,.75); }
  .call { left:48%; top:33%; width:31%; height:11%; }
  .mail { left:48%; top:46%; width:37%; height:10%; }
  .wa { left:48%; top:59%; width:31%; height:11%; }
  .qr { left:72%; top:68%; width:20%; height:24%; }
  .note { text-align:center; margin-top:15px; color:#eadc84; font-size:13px; opacity:.85; }
  @media (max-width:620px) {
    .card { border-radius:18px; }
    .title span { letter-spacing:3px; }
    .btn { width:100%; text-align:center; }
  }
</style>
</head>
